name: PR Tests

on:
  pull_request:
    branches: ["master"]
  workflow_call:

jobs:
  checks:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: lint
            script: lint
          - task: format
            script: format
          - task: test
            script: test:coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: bun run ${{ matrix.script }}

      - name: Report Coverage
        # Only on pull_request: the comment needs a PR context, and this
        # workflow is also reused via workflow_call on push.
        if: always() && matrix.task == 'test' && github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: coverage/lcov.info
          delete-old-comments: true

      - name: Upload coverage report
        if: matrix.task == 'test'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
